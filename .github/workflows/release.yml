name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUNVERSION: "1.3.14"
  NODEVERSION: "22.14.0"

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODEVERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUNVERSION }}

      - name: Enable Corepack for Yarn 4
        run: |
          corepack enable
          yarn --version

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint:fix

      - name: TypeScript type check
        run: yarn typecheck

  build-and-package:
    name: Build & Package
    needs: lint-and-typecheck
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODEVERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUNVERSION }}

      - name: Enable Corepack for Yarn 4
        run: |
          corepack enable
          yarn --version

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build TypeScript
        run: yarn build

      - name: Package standalone binaries all platforms
        run: yarn package

      - name: List build artifacts
        run: ls -lh ./build/Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-cli-binaries
          path: build/Release/*
          if-no-files-found: error
          retention-days: 5

  create-release:
    name: Create GitHub Release
    needs: build-and-package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mcp-cli-binaries
          path: ./build/Release

      - name: List release assets
        run: ls -lh ./build/Release

      - name: Generate checksums
        working-directory: ./build/Release
        run: |
          for file in *; do
            if [ -f "$file" ] && [[ "$file" != *.sha256 ]]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## mcp-cli ${{ github.ref_name }}

            ### Installation
            Download the appropriate binary for your platform:

            - **Windows x64**: `mcp-cli-windows-x64.exe`
            - **Linux x64**: `mcp-cli-linux-x64`
            - **Linux ARM64**: `mcp-cli-linux-arm64`
            - **macOS Intel**: `mcp-cli-darwin-x64`
            - **macOS Apple Silicon**: `mcp-cli-darwin-arm64`

            ### Checksums
            SHA256 checksums are provided for each binary.
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ./build/Release/*
